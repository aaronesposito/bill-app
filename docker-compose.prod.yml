services:
  bill-api:
    command: ["waitress-serve", "--listen=0.0.0.0:5040", "app:app"]


  bill-frontend:
    build:
      context: ./bill-frontend
      target: prod         # <— prod stage
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL}"
    image: aarooon16045/bill-frontend:latest
    ports:
    - "5004:80"



networks:
  database-network:
    external: true