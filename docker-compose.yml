services:
  bill-api:
    build: ./bill-api
    image: aarooon16045/bill-api:latest
    ports: 
      - "5040:5040"
    restart: on-failure
    working_dir: /srv/bill-api
    # command: ["flask", "run", "--host=0.0.0.0", "--port=5040", "--debug"]
    command: ["waitress-serve", "--listen=0.0.0.0:5040", "app:app"]
    env_file:
      - .env
    networks:
      - database-network

  bill-frontend:
    image: node:lts-bullseye
    working_dir: /app
    command: bash -c "npm install && npm run build && npm run preview"
    volumes:
      - ./bill-frontend:/app:rw
    environment:
      VITE_API_HOST: ${REACT_APP_API_HOST}
    ports:
      - "5004:5004"
    env_file:
      - .env


networks:
  database-network:
    external: true