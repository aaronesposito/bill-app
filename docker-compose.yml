services:
  bill-api:
    build: ./bill-api
    image: aarooon16045/bill-api:lts
    ports: 
      - "8081:8081"
    restart: on-failure
    volumes:
      - ./bill-api:/srv/bill-api
    working_dir: /srv/bill-api
    command: ["flask", "run", "--host=0.0.0.0", "--port=8081", "--debug"]
    env_file:
      - .env
    networks:
      - database-network

  bill-frontend:
    image: node:lts-bullseye
    working_dir: /app
    command: bash -c "npm install && npm run dev -- --host 0.0.0.0 --port 5004"
    volumes:
      - ./bill-frontend:/app:rw
      # keep node_modules inside the container so the bind mount doesn't shadow it
      - /app/node_modules
    environment:
      # ensure Vite/chokidar polls for changes across the bind mount
      CHOKIDAR_USEPOLLING: "true"
      # optional but often helps on Docker Desktop
      WATCHPACK_POLLING: "true"
      # your existing var
      VITE_API_HOST: ${REACT_APP_API_HOST}
    ports:
      - "5004:5004"
    env_file:
      - .env


networks:
  database-network:
    external: true