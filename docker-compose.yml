services:
  flask-app:
    build: .
    image: aarooon16045/bill-app-dev:latest
    ports:
      - "5011:5011"
    restart: on-failure
    depends_on:
      - postgres
    #debugging
    volumes:
      - ./bill-api:/app
    working_dir: /app
    # debugging
    command:  ["flask", "run", "--host=0.0.0.0", "--port=5001", "--debug"]
    # prod
    # command: ["waitress-serve", "--host=0.0.0.0", "--port=5001", "app:app"]
    env_file:
      - ./bill-api/.env

  postgres:
    image: postgres:14.5-bullseye
    container_name: bill-dev
    restart: on-failure
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: "bill_db"
    volumes:
      - bill-dev-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: bill-admin-dev
    restart: on-failure
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${DB_ADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${DB_ADMIN_PASSWORD}
    ports:
      - "5052:80"


volumes:
  bill-dev-data:
    name: bill-dev-data