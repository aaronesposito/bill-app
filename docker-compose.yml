services:
  bill-api:
    build: ./bill-api
    image: aarooon16045/bill-api:latest
    ports: 
      - "5005:5040"
    restart: on-failure
    working_dir: /srv/bill-api
    env_file:
      - .env.${ENV}
    networks:
      - database-network

  bill-frontend:
    image: aarooon16045/app-frontend:${TAG:-latest}
    env_file:
      - .env.${ENV}


networks:
  database-network:
    external: true