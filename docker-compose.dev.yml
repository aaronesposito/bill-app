services:
  bill-api:
    image: aarooon16045/bill-api:dev
    environment:
      FLASK_ENV: development
    command: ["flask", "run", "--host=0.0.0.0", "--port=5040", "--debug"]
    volumes:
      - ./bill-api:/srv/bill-api

  bill-frontend:
      build:
        context: ./bill-frontend
        target: dev
      image: aarooon16045/bill-frontend:dev
      volumes:
        - ./bill-frontend:/app
      environment:
        VITE_API_BASE_URL: "http://localhost:5005"
      command: bash -c "npm install && npm run dev -- --host 0.0.0.0 --port 5004"


